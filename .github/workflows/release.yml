name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Manual fallback for environments that cannot push tags: dispatching with
  # a version builds the current ref and lets the release step create the tag.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v0.1.0); the tag is created at the dispatched ref"
        required: true
  # Callable from other workflows with the same input.
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Tag-push runs use the tag name; dispatch runs use the supplied input.
  RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      # One target failing must not cancel the other release artifacts.
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2.8.0
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl') && !matrix.cross
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          VERSION=$RELEASE_VERSION
          ARCHIVE="bocal-${VERSION}-${{ matrix.target }}.tar.gz"
          tar czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" bocal
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: bocal-${{ env.RELEASE_VERSION }}-${{ matrix.target }}.tar.gz
          path: bocal-${{ env.RELEASE_VERSION }}-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      x86_64_mac_sha: ${{ steps.shas.outputs.x86_64_mac }}
      aarch64_mac_sha: ${{ steps.shas.outputs.aarch64_mac }}
      x86_64_linux_sha: ${{ steps.shas.outputs.x86_64_linux }}
      aarch64_linux_sha: ${{ steps.shas.outputs.aarch64_linux }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Compute SHAs
        id: shas
        run: |
          VERSION=$RELEASE_VERSION
          echo "x86_64_mac=$(shasum -a 256 dist/bocal-${VERSION}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "aarch64_mac=$(shasum -a 256 dist/bocal-${VERSION}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "x86_64_linux=$(shasum -a 256 dist/bocal-${VERSION}-x86_64-unknown-linux-musl.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "aarch64_linux=$(shasum -a 256 dist/bocal-${VERSION}-aarch64-unknown-linux-musl.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION=$RELEASE_VERSION
          NOTES=$(awk "/^## \[${VERSION#v}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # On dispatch runs the tag does not exist yet; the action creates it
          # at the built commit. On tag-push runs this matches the pushed tag.
          tag_name: ${{ env.RELEASE_VERSION }}
          files: "dist/*.tar.gz"
          body: ${{ steps.changelog.outputs.notes }}

  publish-crates:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.8.0
      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: hefgi/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          X86_64_MAC_SHA: ${{ needs.release.outputs.x86_64_mac_sha }}
          AARCH64_MAC_SHA: ${{ needs.release.outputs.aarch64_mac_sha }}
          X86_64_LINUX_SHA: ${{ needs.release.outputs.x86_64_linux_sha }}
          AARCH64_LINUX_SHA: ${{ needs.release.outputs.aarch64_linux_sha }}
        run: |
          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/bocal.rb << FORMULA
          class Bocal < Formula
            desc "Snapshot, share, and restore your local dev environment"
            homepage "https://bocal.ai"
            version "${VERSION#v}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/hefgi/bocal/releases/download/${VERSION}/bocal-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${AARCH64_MAC_SHA}"
              end
              on_intel do
                url "https://github.com/hefgi/bocal/releases/download/${VERSION}/bocal-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_64_MAC_SHA}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/hefgi/bocal/releases/download/${VERSION}/bocal-${VERSION}-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${AARCH64_LINUX_SHA}"
              end
              on_intel do
                url "https://github.com/hefgi/bocal/releases/download/${VERSION}/bocal-${VERSION}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${X86_64_LINUX_SHA}"
              end
            end

            def install
              bin.install "bocal"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/bocal --version")
            end
          end
          FORMULA

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bocal.rb
          git commit -m "bocal ${VERSION#v}"
          git pull --rebase
          git push
